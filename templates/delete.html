<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Patient Record</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <div class="navbar-brand">HealthRisk</div>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/search">Search</a></li>
                <li><a href="/live">Monitor</a></li>
            </ul>
        </div>
    </nav>

    <h1>Delete Patient Record</h1>

    <div class="container">
        <div class="card">
            <form method="POST">
                <input type="text" name="name" placeholder="Enter patient name..." required>
                <button type="submit" style="background: #ff4757;">Delete Record</button>
            </form>

            {% if message %}
            <div style="margin-top: 1.5rem;">
                {% if 'deleted' in message.lower() or 'successfully' in message.lower() %}
                    <div class="alert alert-success">{{message}}</div>
                {% else %}
                    <div class="alert alert-danger">{{message}}</div>
                {% endif %}
            </div>
            {% endif %}
        </div>

        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="/" class="back-link">← Back to Home</a>
        </div>
    </div>
</body>
</html>
